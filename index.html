<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test ISTQB – Simulacro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg-gradient-start: #050608;
      --bg-gradient-end:   #111217;
      --card-bg:           rgba(17, 17, 20, 0.82);
      --card-border:       rgba(120, 120, 130, 0.55);
      --accent:            #e5b567;
      --accent-soft:       #f2cf82;
      --text-main:         #f5f5f7;
      --text-muted:        #a0a0aa;
      --danger:            #f97373;
      --success:           #6ee7b7;
      --shadow-soft:       0 18px 45px rgba(0, 0, 0, 0.7);
      --radius-lg:         18px;
      --radius-pill:       999px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text","Segoe UI", sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      background:
        radial-gradient(circle at 0% 0%, #1b1b22, transparent 58%),
        radial-gradient(circle at 100% 100%, #070708, transparent 60%),
        linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title-card {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      background: linear-gradient(to bottom,
        rgba(5, 6, 10, 0.98),
        rgba(5, 6, 10, 0.80),
        transparent
      );
      padding: 8px 4px 12px;
      margin: -4px -4px 0;
    }

    h1 {
      margin: 0 0 4px;
      font-weight: 600;
      letter-spacing: 0.03em;
      font-size: clamp(1.25rem, 1.5vw + 1rem, 1.7rem);
    }

    .subtitle {
      margin: 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .exam-selector {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .exam-selector label {
      font-weight: 500;
    }

    .exam-selector select {
      background: rgba(24, 24, 30, 0.95);
      color: var(--text-main);
      border-radius: 999px;
      padding: 4px 12px;
      border: 1px solid rgba(120, 120, 130, 0.7);
      font: inherit;
      outline: none;
    }

    .exam-selector select:focus {
      border-color: var(--accent);
    }

    .glass-panel {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .questions-container {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: calc(100vh - 190px);
      overflow-y: auto;
      overscroll-behavior: contain;
      scroll-behavior: smooth;
    }

    .question {
      padding: 12px 14px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 0% 0%, rgba(229, 181, 103, 0.14), transparent 55%),
        rgba(12, 12, 16, 0.88);
      border: 1px solid rgba(120, 120, 130, 0.55);
    }

    .question h3 {
      margin: 0 0 8px;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      white-space: pre-line;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .option-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(10, 10, 14, 0.96);
      border: 1px solid rgba(85, 85, 100, 0.7);
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.08s ease;
    }

    .option-pill:hover {
      border-color: rgba(229, 181, 103, 0.7);
      transform: translateY(-1px);
    }

    .option-pill input[type="radio"],
    .option-pill input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(140, 140, 155, 0.9);
      background: rgba(10, 10, 14, 0.95);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .option-pill input[type="checkbox"] {
      border-radius: 8px;
    }

    .option-pill input[type="radio"]:checked,
    .option-pill input[type="checkbox"]:checked {
      border-color: var(--accent);
      background: radial-gradient(circle at 30% 30%, #fff6e3, var(--accent));
      box-shadow: 0 0 0 3px rgba(229, 181, 103, 0.35);
    }

    .option-pill input[type="radio"]:checked::after,
    .option-pill input[type="checkbox"]:checked::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #181818;
    }

    .option-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .option-key {
      font-weight: 600;
      opacity: 0.85;
    }

    .option-label {
      opacity: 0.96;
    }

    .footer-bar {
      position: sticky;
      bottom: 0;
      padding-top: 8px;
      background: linear-gradient(to top,
        rgba(5, 6, 10, 0.97),
        rgba(5, 6, 10, 0.80),
        transparent
      );
    }

    .footer-inner {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-primary {
      width: 100%;
      border: none;
      border-radius: var(--radius-pill);
      padding: 12px 18px;
      font-size: 0.98rem;
      font-weight: 600;
      color: #111111;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.8);
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.12s ease, filter 0.1s ease;
    }

    .btn-primary:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
      filter: brightness(0.97);
    }

    #result {
      padding: 10px 14px;
      border-radius: 16px;
      background: rgba(10, 10, 14, 0.95);
      border: 1px solid rgba(120, 120, 130, 0.7);
      font-size: 0.9rem;
      color: var(--text-main);
      max-height: 240px;
      overflow-y: auto;
    }

    #result strong { font-weight: 600; }
    .incorrect { color: var(--danger); }
    .correct   { color: var(--success); }

    ul { padding-left: 18px; margin: 6px 0 0; }
    li { margin-bottom: 6px; }

    .questions-container::-webkit-scrollbar,
    #result::-webkit-scrollbar {
      width: 8px;
    }

    .questions-container::-webkit-scrollbar-track,
    #result::-webkit-scrollbar-track {
      background: transparent;
    }

    .questions-container::-webkit-scrollbar-thumb,
    #result::-webkit-scrollbar-thumb {
      background: rgba(90, 90, 105, 0.8);
      border-radius: 999px;
    }

    @media (min-width: 640px) {
      .questions-container {
        padding: 16px;
        gap: 16px;
        max-height: calc(100vh - 210px);
      }

      .question { padding: 14px 16px; }
    }

    @media (min-width: 768px) {
      .footer-inner {
        flex-direction: row;
        align-items: flex-start;
        gap: 12px;
      }

      .btn-primary {
        width: auto;
        min-width: 200px;
      }

      #result { flex: 1; }
    }

    .match-input {
      width: 100%;
      background: transparent;
      border: none;
      color: inherit;
      outline: none;
      font: inherit;
      padding: 4px 0 0;
    }
  </style>
</head>

    function getQuestions(examId) {
      return exams[examId] || [];
    }

    function evaluateExam(examId, userAnswers) {
      const questions = getQuestions(examId);
      const result = { examId, total: questions.length, correctCount: 0, details: [] };

      questions.forEach(q => {
        let isCorrect = false;
        let userValue;

        if (q.type === "match" && q.correctMatch) {
          // match con patrón A-2,B-3...
          if (Array.isArray(userAnswers[q.id])) {
            // match usando opción A/B/C/D (exam_b, exam_a)
            userValue = userAnswers[q.id] || [];
            const sortedUser = [...userValue].sort();
            const sortedCorrect = (q.correctAnswers || []).slice().sort();
            isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
          } else {
            // match texto libre (Cap1)
            userValue = userAnswers[q.id] || "";
            const norm = s => s
              .toUpperCase()
              .replace(/\s+/g, "")
              .replace(/;/g, ",")
              .split(",")
              .filter(Boolean)
              .sort()
              .join(",");
            isCorrect = norm(userValue) === norm(q.correctMatch);
          }
        } else {
          userValue = userAnswers[q.id] || [];
          const sortedUser = [...userValue].sort();
          const sortedCorrect = (q.correctAnswers || []).slice().sort();
          isCorrect = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
        }

        if (isCorrect) {
          result.correctCount++;
        } else {
          result.details.push({
            questionId: q.id,
            text: q.text,
            type: q.type,
            userValue,
            correctValue: q.type === "match" ? (q.correctMatch || q.correctAnswers || "") : q.correctAnswers
          });
        }
      });

      return result;
    }

    return { getQuestions, evaluateExam };
  })();

  // ================
  // VISTA (View)
  // ================
  const QuizView = (() => {
    const container = document.getElementById("questions-container");
    const resultDiv = document.getElementById("result");

    function createOptionPill(question, option) {
      const label = document.createElement("label");
      label.className = "option-pill";

      const input = document.createElement("input");
      input.type = question.type === "multi" ? "checkbox" : "radio";
      input.name = `question-${question.id}`;
      input.value = option.id;

      const textWrapper = document.createElement("div");
      textWrapper.className = "option-text";

      const keySpan = document.createElement("span");
      keySpan.className = "option-key";
      keySpan.textContent = option.id;

      const labelSpan = document.createElement("span");
      labelSpan.className = "option-label";
      labelSpan.textContent = option.text;

      textWrapper.appendChild(keySpan);
      textWrapper.appendChild(labelSpan);

      label.appendChild(input);
      label.appendChild(textWrapper);

      return label;
    }

    function createMatchInput(question) {
      const wrapper = document.createElement("label");
      wrapper.className = "option-pill";

      const textWrapper = document.createElement("div");
      textWrapper.className = "option-text";

      const keySpan = document.createElement("span");
      keySpan.className = "option-key";
      keySpan.textContent = "Respuesta";

      const labelSpan = document.createElement("span");
      labelSpan.className = "option-label";
      labelSpan.textContent =
        "Introduce las parejas letra-número separadas por comas. Ejemplo: A-2, B-3, C-4, D-1, E-5";

      textWrapper.appendChild(keySpan);
      textWrapper.appendChild(labelSpan);

      const input = document.createElement("input");
      input.type = "text";
      input.name = `question-${question.id}`;
      input.placeholder = "A-2, B-3, C-4, D-1, E-5";
      input.className = "match-input";

      wrapper.appendChild(textWrapper);
      wrapper.appendChild(input);

      return wrapper;
    }

    function renderQuestions(questions) {
      container.innerHTML = "";

      questions.forEach((q, index) => {
        const card = document.createElement("div");
        card.className = "question";

        const title = document.createElement("h3");
        title.textContent = `${index + 1}) ${q.text}`;
        card.appendChild(title);

        const optionsDiv = document.createElement("div");
        optionsDiv.className = "options";

        if (q.type === "match" && !q.options) {
          optionsDiv.appendChild(createMatchInput(q));
        } else {
          (q.options || []).forEach(opt => {
            optionsDiv.appendChild(createOptionPill(q, opt));
          });
        }

        card.appendChild(optionsDiv);
        container.appendChild(card);
      });

      resultDiv.innerHTML = "";
    }

    function renderResult(evaluation) {
      const { total, correctCount, details, examId } = evaluation;
      const percent = total ? ((correctCount / total) * 100).toFixed(2) : "0.00";

      let html = "";
      html += `<p><strong>Examen:</strong> ${examId}</p>`;
      html += `<p><strong>Nota:</strong> ${correctCount} / ${total} (${percent}%)</p>`;

      if (!total) {
        html += `<p class="incorrect">No hay preguntas definidas para este examen.</p>`;
        resultDiv.innerHTML = html;
        return;
      }

      if (details.length === 0) {
        html += `<p class="correct"><strong>¡Perfecto!</strong> Todas las respuestas son correctas.</p>`;
      } else {
        html += `<p class="incorrect"><strong>Preguntas falladas:</strong></p>`;
        html += "<ul>";
        details.forEach(item => {
          html += "<li>";
          html += `<strong>Pregunta ${item.questionId}:</strong> ${item.text}<br>`;

          if (item.type === "match" && typeof item.correctValue === "string") {
            html += `Tu respuesta: ${item.userValue || "vacía"}<br>`;
            html += `Respuesta correcta: ${item.correctValue}`;
          } else if (item.type === "match") {
            const user = Array.isArray(item.userValue) ? item.userValue.join(", ") || "ninguna" : (item.userValue || "vacía");
            const correct = Array.isArray(item.correctValue) ? item.correctValue.join(", ") : item.correctValue;
            html += `Tu respuesta: ${user}<br>`;
            html += `Respuesta correcta: ${correct}`;
          } else {
            const user = (item.userValue || []).join(", ") || "ninguna";
            const correct = (item.correctValue || []).join(", ");
            html += `Tus respuestas: ${user}<br>`;
            html += `Respuestas correctas: ${correct}`;
          }
          html += "</li>";
        });
        html += "</ul>";
      }

      resultDiv.innerHTML = html;
    }

    return { renderQuestions, renderResult };
  })();

  // ==================
  // CONTROLADOR (Controller)
  // ==================
  const QuizController = (() => {
    const submitBtn = document.getElementById("submitBtn");
    const examSelect = document.getElementById("examSelect");
    let currentExamId = examSelect.value;

    function loadExam(examId) {
      currentExamId = examId;
      const questions = QuizModel.getQuestions(examId);
      QuizView.renderQuestions(questions);
    }

    function collectUserAnswers() {
      const questions = QuizModel.getQuestions(currentExamId);
      const answers = {};

      questions.forEach(q => {
        if (q.type === "match" && !q.options) {
          const input = document.querySelector(`input[name="question-${q.id}"]`);
          answers[q.id] = (input && input.value) || "";
        } else {
          const inputs = document.querySelectorAll(
            `input[name="question-${q.id}"]:checked`
          );
          answers[q.id] = Array.from(inputs).map(i => i.value);
        }
      });

      return answers;
    }

    function handleSubmit() {
      const userAnswers = collectUserAnswers();
      const evaluation = QuizModel.evaluateExam(currentExamId, userAnswers);
      QuizView.renderResult(evaluation);
    }

    function init() {
      loadExam(currentExamId);
      examSelect.addEventListener("change", e => loadExam(e.target.value));
      submitBtn.addEventListener("click", handleSubmit);
    }

    return { init };
  })();

  QuizController.init();
</script>
